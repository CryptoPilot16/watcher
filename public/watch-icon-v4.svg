<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="frame" x1="60" y1="60" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#221b12"/>
      <stop offset="1" stop-color="#130f0b"/>
    </linearGradient>
    <linearGradient id="glyph" x1="160" y1="110" x2="390" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5E8A8"/>
      <stop offset="1" stop-color="#CEB05A"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (OS will apply its own rounding) -->
  <rect width="512" height="512" fill="#0F0D09"/>
  <!-- Inner panel -->
  <rect x="52" y="52" width="408" height="408" rx="72" fill="url(#frame)" stroke="#CBAE5F" stroke-width="8"/>
  <!-- Muted horizontal lines (document lines) -->
  <path d="M148 166h216" stroke="#3d2f18" stroke-width="18" stroke-linecap="round"/>
  <path d="M148 272h130" stroke="#3d2f18" stroke-width="18" stroke-linecap="round"/>
  <path d="M148 378h190" stroke="#3d2f18" stroke-width="18" stroke-linecap="round"/>
  <!-- Cursor vertical stem -->
  <path d="M268 148v216" stroke="url(#glyph)" stroke-width="22" stroke-linecap="round"/>
  <!-- Cursor diagonal arm -->
  <path d="M268 264 l86-86" stroke="url(#glyph)" stroke-width="22" stroke-linecap="round"/>
  <!-- Top dot -->
  <circle cx="354" cy="178" r="26" fill="#F5E8A8"/>
  <!-- Pivot dot -->
  <circle cx="268" cy="264" r="34" fill="#CEB05A"/>
</svg>
