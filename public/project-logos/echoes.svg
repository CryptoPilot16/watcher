<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Echoes logo: concentric arcs radiating from a central dot, like sound waves / sonar -->
  <rect width="200" height="200" fill="#000"/>
  <!-- Central dot -->
  <circle cx="100" cy="100" r="6" fill="#fff"/>
  <!-- Echo arcs -->
  <path d="M100 68 A32 32 0 0 1 100 132" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M100 50 A50 50 0 0 1 100 150" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M100 32 A68 68 0 0 1 100 168" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Mirror arcs (left side) -->
  <path d="M100 68 A32 32 0 0 0 100 132" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M100 50 A50 50 0 0 0 100 150" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M100 32 A68 68 0 0 0 100 168" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
